{{define "title"}}User Management - Schedule MCP{{end}}

{{define "content"}}
<div class="header-actions">
    <h1>User Management</h1>
    <p class="text-muted">Manage user roles and subscription tiers</p>
</div>

<div class="bento-card mt-4" style="overflow-x: auto;">
    <table style="width: 100%; border-collapse: collapse;">
        <thead>
            <tr style="text-align: left; border-bottom: 2px solid var(--border-color);">
                <th style="padding: 1rem;">Email</th>
                <th style="padding: 1rem;">Tier</th>
                <th style="padding: 1rem;">Role</th>
                <th style="padding: 1rem;">Joined</th>
                <th style="padding: 1rem;">Actions</th>
            </tr>
        </thead>
        <tbody>
            {{range .Data.Users}}
            <tr style="border-bottom: 1px solid var(--border-color);">
                <td style="padding: 1rem;"><strong>{{.Email}}</strong></td>
                <td style="padding: 1rem;">
                    <span class="badge" style="padding: 0.25rem 0.5rem; border-radius: 9999px; font-size: 0.75rem; background: var(--accent-soft); color: var(--accent-primary);">
                        {{.Tier}}
                    </span>
                </td>
                <td style="padding: 1rem;">{{.Role}}</td>
                <td style="padding: 1rem; font-size: 0.875rem; color: #666;">{{.CreatedAt.Format "02 Jan 2006"}}</td>
                <td style="padding: 1rem;">
                    <div style="display: flex; gap: 0.5rem;">
                        <form action="/admin/users/update" method="POST" style="display: inline;">
                            <input type="hidden" name="user_id" value="{{.ID}}">
                            <input type="hidden" name="role" value="{{if eq .Role "user"}}staff{{else}}user{{end}}">
                            <button type="submit" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; width: auto; background: #6366f1;">
                                {{if eq .Role "user"}}Make Staff{{else}}Make User{{end}}
                            </button>
                        </form>
                        <form action="/admin/users/update" method="POST" style="display: inline;">
                            <input type="hidden" name="user_id" value="{{.ID}}">
                            <input type="hidden" name="tier" value="{{if eq .Tier "free"}}pro{{else}}free{{end}}">
                            <button type="submit" class="btn" style="padding: 0.25rem 0.5rem; font-size: 0.75rem; width: auto; background: #ec4899;">
                                {{if eq .Tier "free"}}Set Pro{{else}}Set Free{{end}}
                            </button>
                        </form>
                    </div>
                </td>
            </tr>
            {{end}}
        </tbody>
    </table>
</div>
{{end}}
