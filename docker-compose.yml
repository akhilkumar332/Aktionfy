services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mcp
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  jaeger:
    image: jaegertracing/jaeger:2.0.0
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    ports:
      - "5775:5775/udp"
      - "6831:6831/udp"
      - "6832:6832/udp"
      - "5778:5778"
      - "16686:16686"
      - "14268:14268"
      - "14250:14250"
      - "9411:9411"
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP

  actionfy-server:
    build: .
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432/mcp?sslmode=disable
      - REDIS_URL=redis://redis:6379/0
      - OTEL_EXPORTER_OTLP_ENDPOINT=jaeger:4317
      - PORT=8080
      - ENV=development
      - LOCAL_DEV=true
      - ADMIN_EMAIL=akhilkumar332@gmail.com
      - BASE_URL=http://localhost:8080
      - CSRF_TRUSTED_ORIGINS=http://192.168.0.26:8080,http://localhost:8080
      - STRIPE_API_KEY=sk_test_...
      - STRIPE_WEBHOOK_SECRET=whsec_...
      - STRIPE_PRO_PRICE_ID=price_...
      - CSRF_KEY=9478330a1088469a91088469a1088469
      - ENCRYPTION_KEY=00112233445566778899aabbccddeeff00112233445566778899aabbccddeeff
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      jaeger:
        condition: service_started

volumes:
  pgdata:
